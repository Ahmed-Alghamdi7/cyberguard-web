<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<!-- 🔥 مهم للجوال -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyber Guard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 10px;
}

/* 🔥 الكرت */
.container {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  width: 90%;
  max-width: 350px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h2 {
  margin-bottom: 10px;
}

/* النص التعريفي */
.info {
  font-size: 12px;
  color: #cbd5e1;
  margin-bottom: 10px;
  line-height: 1.6;
  text-align: right;
}

.info ul {
  padding-right: 15px;
}

/* 🔥 إصلاح مشكلة input */
input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  box-sizing: border-box;
  outline: none;
}

/* الأزرار */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.analyze-btn {
  background: #38bdf8;
}

.clear-btn {
  background: #ef4444;
  color: white;
}

/* النتيجة */
.result {
  margin-top: 15px;
  font-size: 18px;
  font-weight: bold;
  opacity: 0;
  transition: 0.5s;
}

/* التحميل */
.loading {
  margin-top: 10px;
  display: none;
}

/* ألوان النتيجة */
.safe { color: #22c55e; }
.warn { color: #facc15; }
.danger { color: #ef4444; }

/* الحقوق */
.footer {
  margin-top: 15px;
  font-size: 12px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="container">

<h2>🔐 Cyber Guard</h2>

<div class="info">
  أداة لفحص الروابط بشكل مبسط لاكتشاف المؤشرات المشبوهة.<br><br>
  ⚠️ تنبيه: الأداة تعليمية وليست نظام حماية احترافي.<br><br>

  💡 نصائح:
  <ul>
    <li>لا تفتح روابط مجهولة</li>
    <li>تأكد من وجود https</li>
    <li>انتبه لروابط تسجيل الدخول المزيفة</li>
  </ul>
</div>

<input type="text" id="link" placeholder="الصق الرابط هنا">

<button class="analyze-btn" onclick="analyze()">Analyze</button>
<button class="clear-btn" onclick="clearInput()">Clear</button>

<div class="loading" id="loading">⏳ جاري التحليل...</div>

<div class="result" id="result"></div>
<div id="explanation"></div>

<div class="footer">
Developed by: Ahmed Alghamdi | أحمد الغامدي
</div>

</div>

<script src="script.js"></script>

</body>
</html>
